<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AutoPMF</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="phone">
  <div class="app">

    <!-- Nav bar -->
    <header class="nav-bar">
      <div class="nav-title">AutoPMF</div>
    </header>

    <!-- Main content area -->
    <main class="content" id="content">

      <!-- Product screen (placeholder for whatever product you build) -->
      <section class="screen active" id="product-screen">
        <div class="placeholder-message">
          <h2>Your product goes here</h2>
          <p>Define your product in <code>product.md</code> and build it out. The feedback mechanism is ready to collect user signals.</p>
        </div>
      </section>

      <!-- Feedback screen -->
      <section class="screen" id="feedback-screen">
        <div class="screen-header">
          <button class="back-btn" id="feedback-back-btn">&larr; Back</button>
          <h2>Feedback</h2>
        </div>
        <form class="feedback-form" id="feedback-form">
          <label class="feedback-label">How would you rate this product?</label>
          <div class="slider-container">
            <input type="range" id="feedback-slider" min="0" max="10" value="5" step="1">
            <div class="slider-value" id="slider-value">5</div>
          </div>
          <div class="slider-labels">
            <span>0</span><span>5</span><span>10</span>
          </div>
          <label class="feedback-label" for="feedback-comments">Comments</label>
          <textarea id="feedback-comments" rows="4" maxlength="2000" placeholder="What did you like? What could be better?"></textarea>
          <button type="submit" class="submit-btn" id="feedback-submit">Submit Feedback</button>
          <div class="feedback-status" id="feedback-status"></div>
        </form>
      </section>

      <!-- Stats screen -->
      <section class="screen" id="stats-screen">
        <div class="screen-header">
          <button class="back-btn" id="stats-back-btn">&larr; Back</button>
          <h2>Stats</h2>
        </div>
        <div class="stats-body" id="stats-body">
          <p>Loading stats...</p>
        </div>
      </section>

    </main>

    <!-- Feedback FAB -->
    <button class="feedback-fab" id="feedback-fab" title="Give feedback">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>

    <!-- Stats button -->
    <button class="stats-fab" id="stats-fab" title="View stats">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </button>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
